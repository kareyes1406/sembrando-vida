<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sembrando Vida</title>
    
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card fade-up">
            <div class="login-logo">
                <i data-lucide="leaf" size="32" color="white"></i>
            </div>
            
            <h2>Sembrando Vida</h2>
            <p>Asegurando Territorio</p>
            
            <div id="error-message" class="error-message">
                Correo o contraseña incorrectos.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">
                    <i data-lucide="log-in"></i> Iniciar Sesión
                </button>
            </form>
            
            <div class="login-links">
                <span>¿No tienes cuenta? <a href="#" id="register-link">Regístrate como Guardián</a></span>
                <a href="index.html" class="back-link"><i data-lucide="arrow-left" size="16"></i> Volver al inicio</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data/users.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
